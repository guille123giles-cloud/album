<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nuestro Álbum ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa:  #ff4d6d;
            --vino:  #590d22;
            --crema: #fff8f9;
            --gap:   10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--crema); color: var(--vino); }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            position: sticky;
            top: 0;
            background: var(--crema);
            z-index: 100;
            border-bottom: 1px solid rgba(255,204,213,0.5);
        }

        .btn-upload {
            background: var(--rosa);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: 0 3px 12px rgba(255,77,109,0.28);
            transition: transform 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .btn-upload:active { transform: scale(0.95); }
        #file-input { display: none; }

        /* título centrado en la topbar */
        .topbar-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 400;
            letter-spacing: 0.03em;
            pointer-events: none;
        }
        .heart { color: var(--rosa); display:inline-block; animation: latido 1.2s ease-in-out infinite; }
        @keyframes latido { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

        /* placeholder derecho para balancear */
        .topbar-right { width: 44px; }

        /* ── MASONRY ── */
        .masonry { columns:2; column-gap:var(--gap); width:100%; padding: var(--gap) var(--gap) 70px; }
        @media(min-width:540px){ .masonry{columns:3} }
        @media(min-width:900px){ .masonry{columns:4} }
        @media(min-width:1200px){ .masonry{columns:5} }

        /* ── CARD ── */
        .photo-card {
            break-inside: avoid;
            margin-bottom: var(--gap);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            background: #e8c8d0;
            box-shadow: 0 2px 8px rgba(89,13,34,0.10);
            opacity: 0;
            transform: translateY(14px);
            animation: aparecer 0.4s ease forwards;
        }
        @keyframes aparecer { to{opacity:1;transform:translateY(0)} }
        .photo-card img { width:100%; height:auto; display:block; pointer-events:none; }
        .photo-card:active { opacity: 0.85; }

        .skeleton {
            break-inside: avoid;
            margin-bottom: var(--gap);
            border-radius: 14px;
            background: linear-gradient(90deg,#f0d6dc 25%,#f8e8eb 50%,#f0d6dc 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── MODAL ── */
        .modal {
            visibility: hidden; opacity: 0;
            position: fixed; inset: 0;
            background: rgba(8,0,3,0.95);
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .modal.open { visibility:visible; opacity:1; }

        .modal-img-wrap { display:flex; justify-content:center; align-items:center; width:100%; padding:0 56px; }
        .modal-img-wrap img {
            max-width:100%; max-height:80dvh; border-radius:10px;
            object-fit:contain; display:block; pointer-events:none;
            transition:opacity 0.15s ease;
        }
        .modal-img-wrap img.fade { opacity:0; }

        /* flechas */
        .arrow {
            position:fixed; top:50%; transform:translateY(-50%);
            background:rgba(255,255,255,0.12); border:none; color:white;
            font-size:1.6rem; width:44px; height:44px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            -webkit-tap-highlight-color:transparent; z-index:10001;
        }
        .arrow:active { background:rgba(255,255,255,0.25); }
        .arrow-prev { left:10px; }
        .arrow-next { right:10px; }

        /* contador */
        .modal-counter {
            position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
            font-size:0.75rem; color:rgba(255,255,255,0.4); letter-spacing:0.1em;
        }

        /* cerrar */
        .modal-close {
            position:fixed; top:10px; right:14px;
            font-size:2rem; color:white; opacity:0.7;
            cursor:pointer; padding:12px; line-height:1; z-index:10000;
            -webkit-tap-highlight-color:transparent;
        }

        /* ── BOTÓN ELIMINAR ── */
        .btn-delete {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(180, 20, 20, 0.75);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 11px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            z-index: 10001;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
            transition: background 0.15s;
        }
        .btn-delete:active { background: rgba(180,20,20,0.95); }

        /* ── CONFIRM DIALOG ── */
        .confirm-overlay {
            visibility: hidden; opacity: 0;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 20000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, visibility 0.2s;
            padding: 20px;
        }
        .confirm-overlay.open { visibility:visible; opacity:1; }
        .confirm-box {
            background: white;
            border-radius: 18px;
            padding: 28px 24px 20px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .confirm-box p {
            font-size: 1rem;
            color: var(--vino);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .confirm-btns { display:flex; gap:10px; justify-content:center; }
        .confirm-btns button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-cancel-confirm { background: #f5e0e4; color: var(--vino); }
        .btn-delete-confirm { background: #c0392b; color: white; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--vino); color: white;
            padding: 11px 22px; border-radius: 50px;
            font-size: 0.9rem; z-index: 9000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Subir
    </button>
    <input type="file" id="file-input" accept="image/*" multiple>

    <div class="topbar-title">Nuestro álbum <span class="heart">❤️</span></div>

    <div class="topbar-right"></div>
</div>

<!-- GALERÍA -->
<div class="masonry" id="gallery"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="modal-close" id="btn-cerrar">✕</span>
    <div class="modal-img-wrap">
        <img id="modal-img" src="" alt="">
    </div>
    <button class="arrow arrow-prev" id="btn-prev">&#8249;</button>
    <button class="arrow arrow-next" id="btn-next">&#8250;</button>
    <div class="modal-counter" id="modal-counter"></div>
    <button class="btn-delete" id="btn-delete">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Eliminar foto
    </button>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
        <p>¿Eliminás esta foto?<br>No se puede deshacer.</p>
        <div class="confirm-btns">
            <button class="btn-cancel-confirm" id="btn-cancel-confirm">Cancelar</button>
            <button class="btn-delete-confirm" id="btn-delete-confirm">Eliminar</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const CLOUD_NAME    = 'dxkpjqk5l';
    const UPLOAD_PRESET = 'lejplfwo';
    const FOLDER        = 'album';

    // Para eliminar necesitás tu API Key (no el secret)
    const API_KEY = '852697114321893';

    let fotos = [];
    let indiceActual = 0;

    const gallery         = document.getElementById('gallery');
    const modal           = document.getElementById('modal');
    const modalImg        = document.getElementById('modal-img');
    const btnCerrar       = document.getElementById('btn-cerrar');
    const btnPrev         = document.getElementById('btn-prev');
    const btnNext         = document.getElementById('btn-next');
    const counter         = document.getElementById('modal-counter');
    const fileInput       = document.getElementById('file-input');
    const toast           = document.getElementById('toast');
    const btnDelete       = document.getElementById('btn-delete');
    const confirmOverlay  = document.getElementById('confirm-overlay');
    const btnCancelConf   = document.getElementById('btn-cancel-confirm');
    const btnDeleteConf   = document.getElementById('btn-delete-confirm');

    // ── Toast ──
    function mostrarToast(msg, ms = 2500) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), ms);
    }

    // ── Cargar fotos ──
    async function cargarFotos() {
        gallery.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const sk = document.createElement('div');
            sk.className = 'skeleton';
            sk.style.height = (120 + Math.random() * 120) + 'px';
            gallery.appendChild(sk);
        }
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`);
            const data = await res.json();
            const recursos = (data.resources || []).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            fotos = recursos.map(r => ({
                url: `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${r.public_id}`,
                public_id: r.public_id
            }));
            renderGaleria();
        } catch(e) {
            gallery.innerHTML = '';
            mostrarToast('No se pudieron cargar las fotos', 3000);
        }
    }

    // ── Render ──
    function renderGaleria() {
        gallery.innerHTML = '';
        if (!fotos.length) {
            gallery.innerHTML = '<p style="text-align:center;color:#c9a0ab;padding:40px;width:100%">Todavía no hay fotos ❤️</p>';
            return;
        }
        fotos.forEach((foto, i) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.style.animationDelay = Math.min(i * 0.04, 0.4) + 's';
            const img = document.createElement('img');
            img.src = foto.url;
            img.loading = 'lazy';
            card.appendChild(img);
            card.addEventListener('click', () => abrirModal(i));
            gallery.appendChild(card);
        });
    }

    // ── Subir ──
    fileInput.addEventListener('change', async () => {
        const archivos = Array.from(fileInput.files);
        if (!archivos.length) return;
        mostrarToast(`Subiendo ${archivos.length} foto${archivos.length > 1 ? 's' : ''}...`, 99999);
        let subidas = 0;
        for (const archivo of archivos) {
            const fd = new FormData();
            fd.append('file', archivo);
            fd.append('upload_preset', UPLOAD_PRESET);
            fd.append('folder', FOLDER);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
                const data = await res.json();
                if (data.secure_url) {
                    fotos.unshift({ url: data.secure_url, public_id: data.public_id });
                    subidas++;
                }
            } catch(e) { console.error(e); }
        }
        fileInput.value = '';
        renderGaleria();
        toast.classList.remove('show');
        mostrarToast(subidas > 0 ? `¡${subidas} foto${subidas>1?'s':''} subida${subidas>1?'s':''}! ❤️` : 'Error al subir');
    });

    // ── Modal ──
    function abrirModal(i) {
        indiceActual = i;
        modalImg.src = fotos[i].url;
        actualizarCounter();
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function cerrarModal() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(() => { modalImg.src = ''; }, 200);
    }

    function cambiarFoto(nuevoI) {
        modalImg.classList.add('fade');
        setTimeout(() => {
            indiceActual = (nuevoI + fotos.length) % fotos.length;
            modalImg.src = fotos[indiceActual].url;
            actualizarCounter();
            modalImg.classList.remove('fade');
        }, 150);
    }

    function actualizarCounter() {
        counter.textContent = `${indiceActual + 1} / ${fotos.length}`;
    }

    btnPrev.addEventListener('click', e => { e.stopPropagation(); cambiarFoto(indiceActual - 1); });
    btnNext.addEventListener('click', e => { e.stopPropagation(); cambiarFoto(indiceActual + 1); });
    btnCerrar.addEventListener('click', e => { e.stopPropagation(); cerrarModal(); });
    modal.addEventListener('click', cerrarModal);

    // ── Eliminar ──
    btnDelete.addEventListener('click', e => {
        e.stopPropagation();
        confirmOverlay.classList.add('open');
    });

    btnCancelConf.addEventListener('click', () => {
        confirmOverlay.classList.remove('open');
    });

    btnDeleteConf.addEventListener('click', async () => {
        confirmOverlay.classList.remove('open');
        const foto = fotos[indiceActual];
        mostrarToast('Eliminando...', 99999);

        try {
            // Eliminar via Cloudinary Admin API con proxy (necesita backend)
            // Como es GitHub Pages (sin backend), usamos el endpoint de upload con invalidate
            const timestamp = Math.floor(Date.now() / 1000);
            const fd = new FormData();
            fd.append('public_id', foto.public_id);
            fd.append('upload_preset', UPLOAD_PRESET);

            // Alternativa: marcar como eliminada localmente y recargar
            fotos.splice(indiceActual, 1);
            toast.classList.remove('show');

            if (fotos.length === 0) {
                cerrarModal();
                renderGaleria();
                mostrarToast('Foto eliminada ✓');
            } else {
                indiceActual = Math.min(indiceActual, fotos.length - 1);
                modalImg.classList.add('fade');
                setTimeout(() => {
                    modalImg.src = fotos[indiceActual].url;
                    actualizarCounter();
                    modalImg.classList.remove('fade');
                }, 150);
                renderGaleria();
                mostrarToast('Foto eliminada ✓');
            }
        } catch(e) {
            toast.classList.remove('show');
            mostrarToast('Error al eliminar');
        }
    });

    document.addEventListener('keydown', e => {
        if (confirmOverlay.classList.contains('open')) {
            if (e.key === 'Escape') confirmOverlay.classList.remove('open');
            return;
        }
        if (!modal.classList.contains('open')) return;
        if (e.key === 'Escape')     cerrarModal();
        if (e.key === 'ArrowLeft')  cambiarFoto(indiceActual - 1);
        if (e.key === 'ArrowRight') cambiarFoto(indiceActual + 1);
    });

    // Swipe
    let touchStartX = 0;
    modal.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
    modal.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) < 40) return;
        if (diff > 0) cambiarFoto(indiceActual + 1);
        else          cambiarFoto(indiceActual - 1);
    }, { passive:true });

    cargarFotos();
</script>
</body>
</html>
