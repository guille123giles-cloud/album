<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nuestro Álbum ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa:  #ff4d6d;
            --vino:  #590d22;
            --crema: #fff8f9;
            --gap:   10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--crema);
            color: var(--vino);
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 44px 20px 28px;
        }
        header::after {
            content: '';
            display: block;
            width: 48px;
            height: 2px;
            background: var(--rosa);
            margin: 14px auto 0;
            border-radius: 2px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 9vw, 3rem);
            font-weight: 400;
            letter-spacing: 0.03em;
        }
        .heart {
            display: inline-block;
            color: var(--rosa);
            animation: latido 1.2s ease-in-out infinite;
        }
        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.3); }
        }

        /* ── MASONRY ── */
        .masonry {
            columns: 2;
            column-gap: var(--gap);
            width: 100%;
            padding: 0 var(--gap) 70px;
        }
        @media (min-width: 540px)  { .masonry { columns: 3; } }
        @media (min-width: 900px)  { .masonry { columns: 4; } }
        @media (min-width: 1200px) { .masonry { columns: 5; } }

        /* ── CARD ── */
        .photo-card {
            break-inside: avoid;
            margin-bottom: var(--gap);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            background: #e8c8d0;
            box-shadow: 0 2px 8px rgba(89,13,34,0.10);
            opacity: 0;
            transform: translateY(14px);
            animation: aparecer 0.4s ease forwards;
        }
        .photo-card:nth-child(1)   { animation-delay: 0.04s }
        .photo-card:nth-child(2)   { animation-delay: 0.08s }
        .photo-card:nth-child(3)   { animation-delay: 0.12s }
        .photo-card:nth-child(4)   { animation-delay: 0.16s }
        .photo-card:nth-child(5)   { animation-delay: 0.20s }
        .photo-card:nth-child(6)   { animation-delay: 0.24s }
        .photo-card:nth-child(n+7) { animation-delay: 0.28s }
        @keyframes aparecer {
            to { opacity: 1; transform: translateY(0); }
        }
        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        .photo-card:active { opacity: 0.85; }

        /* ── MODAL ── */
        .modal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            inset: 0;
            background: rgba(8,0,3,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
        }

        /* imagen con transición al cambiar */
        .modal-img-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 56px;        /* espacio para las flechas */
        }
        .modal-img-wrap img {
            max-width: 100%;
            max-height: 88dvh;
            border-radius: 10px;
            object-fit: contain;
            display: block;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .modal-img-wrap img.fade {
            opacity: 0;
        }

        /* ── FLECHAS ── */
        .arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
            z-index: 10001;
        }
        .arrow:active { background: rgba(255,255,255,0.25); }
        @media (hover: hover) {
            .arrow:hover { background: rgba(255,255,255,0.22); }
        }
        .arrow-prev { left: 10px; }
        .arrow-next { right: 10px; }

        /* ── CONTADOR (ej: 3 / 40) ── */
        .modal-counter {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.1em;
        }

        /* ── BOTÓN CERRAR ── */
        .modal-close {
            position: fixed;
            top: 10px;
            right: 14px;
            font-size: 2rem;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            padding: 12px;
            line-height: 1;
            z-index: 10000;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<header>
    <h1>Nuestro álbum <span class="heart">❤️</span></h1>
</header>

<div class="masonry" id="gallery"></div>

<div id="modal" class="modal">
    <span class="modal-close" id="btn-cerrar">✕</span>

    <div class="modal-img-wrap">
        <img id="modal-img" src="" alt="">
    </div>

    <button class="arrow arrow-prev" id="btn-prev">&#8249;</button>
    <button class="arrow arrow-next" id="btn-next">&#8250;</button>

    <div class="modal-counter" id="modal-counter"></div>
</div>

<script>
    const misFotos = [
        'fotos/007E5DA7-0669-42F3-855A-D816C8E1ED51.JPG',
        'fotos/14753985-5170-4088-a5b1-e37a00eccd90.JPG',
        'fotos/1BF169B5-450E-4226-8B08-54F2992E87B3.JPG',
        'fotos/1D6A1658-2A14-4107-99E6-A96A1E5C08BD.JPG',
        'fotos/207FA196-77F6-4806-A745-27D25C23E1A7.JPG',
        'fotos/25705c9d-e4da-442d-94be-867784bb015c.jpg',
        'fotos/27EAE477-FB35-4DF5-8F9A-D8A49AA3EAB5.JPG',
        'fotos/29BFF7A9-9EA7-4D6D-8800-DFAAF7DC3AB0.jpg',
        'fotos/35166dc1-890d-417a-8bce-416734785c34.JPG',
        'fotos/498552da-76f9-4a97-8d7e-49e58af73592.jpg',
        'fotos/55C2C44E-16FA-4905-B930-A07889B4B926.JPG',
        'fotos/56e3a52a-7e33-4b3b-ba47-04b080573560.JPG',
        'fotos/5779686F-DBB4-4A68-9F8E-854CE9CF61AC.JPG',
        'fotos/5a8c6c44-f600-465b-a5a2-1a5586031416.JPG',
        'fotos/5db56886-038f-4dc7-9e0d-17a9a47ff32b.jpg',
        'fotos/64ab917a-693d-411e-ab48-3a3a2636252e.JPG',
        'fotos/650F3F95-618B-40CB-9144-0D90C7E2E638.JPG',
        'fotos/6536e261-0164-42b5-891d-6972a765f9b4.JPG',
        'fotos/66460107-4f66-4852-ad61-3d098d806e0a.JPG',
        'fotos/667e4c11-6f84-432c-b441-06bd383e1bac.JPG',
        'fotos/67CD414C-5524-46E3-B3F0-1F84C048C079.JPG',
        'fotos/814c6e3e-21bc-4df4-9cf0-0b5fe192d6dd.JPG',
        'fotos/9385E51B-D8E2-4AE2-847F-493D7DE746C4.JPG',
        'fotos/957a37f5-2243-454e-84db-a4999b18b821.JPG',
        'fotos/9DC3C07E-C62B-4F81-8AD0-4350934C8445.JPG',
        'fotos/a0c707de-9dd2-4081-bdcf-2732efdeeecb.jpg',
        'fotos/a804e985-fbab-482e-b3d5-026d74f34c20.JPG',
        'fotos/c5e7885f-8aa5-4e3a-b4fd-3d46de2bf0be.JPG',
        'fotos/cc277d7b-d9b6-4b14-ba51-dd906b78a388.JPG',
        'fotos/CDC7EE26-49BF-4933-83A6-6B144A917DA0.JPG',
        'fotos/d188d46d-0c49-478b-b343-f8f039520ec5.JPG',
        'fotos/d6186f01-d35d-49b5-b56a-2e880228b8c5.JPG',
        'fotos/DC34CFBD-E496-4A06-B3D0-4AF8654DAB12.JPG',
        'fotos/EA0E0C95-5115-4D4B-8C53-D56665B8067A.JPG',
        'fotos/F928CECE-5F64-4D4C-BBE4-4F2E85C5125A.JPG',
        'fotos/fdfbccbf-dd54-4f08-a87a-948a04a47be6.JPG',
        'fotos/IMG_4962.JPG',
        'fotos/IMG_5014.JPG',
        'fotos/IMG_5091.JPG',
        'fotos/IMG_5950.jpg'
    ];

    const gallery    = document.getElementById('gallery');
    const modal      = document.getElementById('modal');
    const modalImg   = document.getElementById('modal-img');
    const btnCerrar  = document.getElementById('btn-cerrar');
    const btnPrev    = document.getElementById('btn-prev');
    const btnNext    = document.getElementById('btn-next');
    const counter    = document.getElementById('modal-counter');

    let indiceActual = 0;

    // ── Construir galería ──
    misFotos.forEach((ruta, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const img = document.createElement('img');
        img.src = ruta;
        img.loading = 'lazy';
        card.appendChild(img);
        card.addEventListener('click', () => abrirModal(i));
        gallery.appendChild(card);
    });

    // ── Modal ──
    function abrirModal(i) {
        indiceActual = i;
        modalImg.src = misFotos[i];
        actualizarCounter();
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function cerrarModal() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(() => { modalImg.src = ''; }, 200);
    }

    function cambiarFoto(nuevoIndice) {
        // fade out → cambia src → fade in
        modalImg.classList.add('fade');
        setTimeout(() => {
            indiceActual = (nuevoIndice + misFotos.length) % misFotos.length;
            modalImg.src = misFotos[indiceActual];
            actualizarCounter();
            modalImg.classList.remove('fade');
        }, 150);
    }

    function actualizarCounter() {
        counter.textContent = `${indiceActual + 1} / ${misFotos.length}`;
    }

    // Flechas
    btnPrev.addEventListener('click', e => { e.stopPropagation(); cambiarFoto(indiceActual - 1); });
    btnNext.addEventListener('click', e => { e.stopPropagation(); cambiarFoto(indiceActual + 1); });

    // Cerrar
    btnCerrar.addEventListener('click', e => { e.stopPropagation(); cerrarModal(); });
    modal.addEventListener('click', cerrarModal);

    // Teclado
    document.addEventListener('keydown', e => {
        if (!modal.classList.contains('open')) return;
        if (e.key === 'Escape')      cerrarModal();
        if (e.key === 'ArrowLeft')   cambiarFoto(indiceActual - 1);
        if (e.key === 'ArrowRight')  cambiarFoto(indiceActual + 1);
    });

    // ── Swipe en mobile ──
    let touchStartX = 0;
    modal.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
    }, { passive: true });

    modal.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) < 40) return;   // ignorar taps y swipes cortos
        if (diff > 0) cambiarFoto(indiceActual + 1);   // swipe izquierda → siguiente
        else          cambiarFoto(indiceActual - 1);   // swipe derecha  → anterior
    }, { passive: true });
</script>
</body>
</html>
